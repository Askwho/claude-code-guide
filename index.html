function R({children,delay=0}){
  const ref=useRef(null);const[v,setV]=useState(false);
  useEffect(()=>{const el=ref.current;if(!el)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect()}},{threshold:.08});o.observe(el);return()=>o.disconnect()},[]);
  return <div ref={ref} style={{opacity:v?1:0,transform:v?"translateY(0)":"translateY(20px)",transition:`opacity .5s ease ${delay}s, transform .5s ease ${delay}s`}}>{children}</div>;
}

      {/* Main */}
      <main ref={mainRef} id="main-area" style={{flex:1,overflowY:"auto",padding:"48px 64px 140px"}}>

          {/* Hero */}
          <R><div style={{marginBottom:80}}>
            <div style={{display:"inline-block",padding:"5px 14px",borderRadius:20,background:"rgba(180,140,80,.08)",border:"1px solid var(--b1)",fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:"var(--gd)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:28,fontWeight:500}}>Condensed Reference</div>

            <h1 className="hero-title" style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:48,fontWeight:300,color:"var(--g)",lineHeight:1.1,letterSpacing:-1.5,marginBottom:28,fontStyle:"italic"}}>Practical Guide</h1>
            <P>A lean, beginner-friendly reference for Claude Code — Anthropic's agentic coding tool. Organised from simple to advanced: get started in minutes, go deeper when you're ready. Sourced from Anthropic's official documentation.</P>
          </div></R>

          {/* Start Here */}
          <section id="start-here" style={{marginBottom:72,scrollMarginTop:40}}>
            <R><div style={{background:"rgba(180,140,80,.06)",border:"1px solid var(--b2)",borderRadius:14,padding:"36px 32px",marginBottom:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
                <span style={{fontSize:20}}>🧭</span>
                <h2 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:26,fontWeight:700,color:"var(--t1)",letterSpacing:-.6}}>Start Here — A Note on Progression</h2>
              </div>
              <P>This guide covers everything from installation to advanced hooks and multi-agent workflows. <B>You do not need most of it on day one.</B> Claude Code is powerful out of the box. The configuration layers exist for when you need them, not before.</P>
              <div style={{background:"var(--bgC)",border:"1px solid var(--b1)",borderRadius:10,padding:"24px 28px",margin:"20px 0"}}>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:600,color:"var(--g)",marginBottom:16,letterSpacing:.5}}>WHAT TO DO FIRST</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[
                    ["Install Claude Code","Step 2 below"],

                </div>
              </div>
              <div style={{background:"rgba(200,96,96,.06)",border:"1px solid rgba(200,96,96,.15)",borderRadius:10,padding:"24px 28px",margin:"20px 0"}}>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:600,color:"var(--ar)",marginBottom:16,letterSpacing:.5}}>WHAT TO AVOID ON DAY ONE</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[
                    ["Don't write hooks yet","Hooks are for enforcing rules you've already discovered. You haven't discovered them yet."],
                    ["Don't build custom skills","Use Claude's built-in capabilities first. Extract skills later when you notice yourself repeating a workflow."],
                    ["Don't overstuff CLAUDE.md","CLAUDE.md should be a slim constitution, short directives and pointers."],
                    ["Don't configure 10 agents","Start with zero custom agents. Claude has built-in subagents (Explore, Plan, General-purpose) that handle most delegation automatically."],
                  ].map(([title,desc],i)=><div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>

                    <div><span style={{color:"var(--t1)",fontWeight:600,fontSize:14}}>{title}</span><span style={{color:"var(--t3)",fontSize:14}}> — {desc}</span></div>
                  </div>)}
                </div>
              </div>
              <P>The rest of this guide is organised from simple to advanced. Sections 01–03 are everything you need to get started. Sections 04–10 explain the configuration layers when you're ready to go deeper. Sections 11–14 cover patterns, best practices, and reference material.</P>
            </div></R>
          </section>

          {/* 01 Intro */}
          <Sec id="intro" num="01" title="What Claude Code Is">
            <R><P>Claude Code is an AI coding assistant from Anthropic that runs in your terminal (the command-line interface on your computer). It can read and edit your files, run scripts, use git, and remember context across sessions. It also works inside VS Code, Cursor, and the Claude Desktop app.</P></R>
            <R delay={.1}><T headers={["Capability","What It Does"]} rows={[
              ["File access","Read and edit any file in your project"],
              ["Shell execution","Run scripts, compilers, build tools directly"],
              ["Git integration","Commits, branches, PRs from the conversation"],
              ["Persistent memory","CLAUDE.md + auto memory survive across sessions"],
              ["Subagents","Spawn specialised sub-agents for parallel tasks"],
              ["Skills & Plugins","Reusable workflows via /skill-name, extensible via plugin marketplace"],
              ["Hooks","Deterministic shell commands at lifecycle events"],
            ]}/></R>
            <R delay={.15}><Box type="info">Requires a <B>Pro, Max, Teams, Enterprise, or Console</B> account. The free Claude.ai plan does not include access. Third-party providers (Bedrock, Vertex AI, Foundry) also supported.</Box></R>
          </Sec>

          {/* 02 Install */}
          <Sec id="install" num="02" title="Installation">
            <R><P>The <B>native binary installer</B> is Anthropic's recommended method. It requires no dependencies (no Node.js), auto-updates in the background, and is the most stable option.</P></R>
            <Sub title="macOS / Linux / WSL">
              <P>Open your terminal application (Terminal on Mac, or any terminal on Linux) and paste this command:</P>
              <C block lang="bash">{`curl -fsSL https://claude.ai/install.sh | bash`}</C>
              <P>If you use <B>Homebrew</B> (a popular package manager for Mac and Linux), you can install with:</P>
              <C block lang="bash">{`brew install --cask claude-code`}</C>
              <Box type="info">Homebrew installations do not auto-update. Run <C>brew upgrade claude-code</C> periodically.</Box>
            </Sub>
            <Sub title="Windows">
              <P>Windows requires <B>Git for Windows</B> or <B>WSL</B> (Windows Subsystem for Linux). Open PowerShell and run:</P>
              <C block lang="powershell">{`irm https://claude.ai/install.ps1 | iex`}</C>
              <P>Alternatively, if you use <B>WinGet</B> (built into Windows 10/11):</P>
              <C block lang="powershell">{`winget install Anthropic.ClaudeCode`}</C>
              <Box type="info">WinGet installations do not auto-update. Run <C>winget upgrade Anthropic.ClaudeCode</C> periodically.</Box>
            </Sub>
            <Sub title="Verify & Start">
              <P>After installation, open a terminal, navigate to the folder containing your project, and type:</P>
              <C block lang="bash">{`cd ~/my-project
claude`}</C>
              <P>You'll be prompted to log in via your browser on first use. After that, you're ready to go. Run <C>claude doctor</C> at any time to check your installation health.</P>
            </Sub>
            <Box type="warn"><B>npm is deprecated.</B> If you previously installed via <C>npm install -g @anthropic-ai/claude-code</C>, Anthropic recommends migrating to the native binary. Run <C>claude install</C> from an existing session, then <C>npm uninstall -g @anthropic-ai/claude-code</C>.</Box>
          </Sec>

          {/* 03 First Steps */}
          <Sec id="first" num="03" title="First Steps — What to Know Immediately">
            <R><P>Before diving into configuration, here are the day-to-day basics that every user should know from the start.</P></R>

            <Sub title="@ File References">
              <P>Type <C>@</C> followed by a filename to include that file's content directly in your prompt. This prevents Claude from doing an unnecessary full-project scan.</P>
              <C block lang="text">{`> @src/auth/login.ts explain this file
> @package.json what dependencies am I using?
> @src/components/ list what's in this directory`}</C>
              <P>In VS Code, press <B>Option+K</B> (Mac) or <B>Alt+K</B> (Windows/Linux) to insert an <C>@</C>-mention with file path and line numbers from your current selection.</P>
            </Sub>

            <Sub title="/clear — Reset Your Conversation">
              <P>When switching to an unrelated task, use <C>/clear</C> to start a fresh session. Stale context wastes tokens on every subsequent message. Your previous session is preserved and can be resumed later with <C>/resume</C>.</P>
              <Box type="tip">Use <C>/rename</C> before clearing so you can easily find the session later.</Box>
            </Sub>

            <Sub title="/compact — Summarise Context">
              <P>When your conversation gets long but you want to continue (not start fresh), use <C>/compact</C>. Claude summarises the conversation history, preserving key context while freeing up space. You can customise what gets preserved: <C>/compact Focus on the API design decisions</C>.</P>
            </Sub>

            <Sub title="/cost — Track Token Usage">
              <P>Run <C>/cost</C> to see how many tokens you've used in the current session. Useful for API users tracking spend. Pro/Max subscribers have usage included in their subscription.</P>
            </Sub>
          </Sec>

          {/* 04 CLAUDE.md */}
          <Sec id="claude-md" num="04" title="CLAUDE.md — The Project Constitution">
            <R><P><C>CLAUDE.md</C> is a plain text file you place in your project root. Claude reads it at the start of every session. It tells Claude about your project's rules, structure, and conventions. Think of it as a brief for a new team member.</P></R>
            <R><Box type="warn">Target <B>under 200 lines</B> per file. Longer files consume more context tokens and reduce how reliably Claude follows them. Instructions are context, not enforced configuration.</Box></R>

            <Sub title="Survives Compaction">
              <P>After <C>/compact</C>, Claude re-reads CLAUDE.md from disk and re-injects it fresh. If an instruction disappeared after compaction, it was given only in conversation — add it to CLAUDE.md to make it persist.</P>
            </Sub>
            <Sub title="Location Hierarchy">
              <T headers={["Location","Scope"]} rows={[
                ["~/.claude/CLAUDE.md","User-level — all projects"],
                ["./CLAUDE.md or ./.claude/CLAUDE.md","Project-level — this repo"],
                ["./CLAUDE.local.md","Local overrides — gitignored"],
                ["Subdirectory CLAUDE.md","On demand when reading files there"],
              ]}/>
            </Sub>
            <Sub title="Importing Files">
              <P>Use <C>@path</C> syntax in CLAUDE.md to reference external content without bloating the file:</P>
              <C block lang="markdown">{`# CLAUDE.md
See @docs/api-conventions.md for API rules.
See @docs/testing-standards.md for test reqs.`}</C>
            </Sub>
            <Sub title="Writing Effective Instructions">
              <P><B>Specific and verifiable</B> — "Use 2-space indentation" not "Format code properly." <B>Markdown structure</B> — headers and bullets aid scanning. <B>Split when growing</B> — move detail into <C>.claude/rules/</C> or <C>@path</C> imports past 200 lines.</P>
              <C block lang="markdown">{`# CLAUDE.MD — My Project

**Project:** [Name]

## Core Principles
1. Plan before building non-trivial tasks
2. Verify output before reporting done
3. Persist corrections via auto memory

## Commands
| Command       | What It Does   |
|---------------|----------------|
| npm run build | Build project  |
| npm test      | Run test suite |`}</C>
            </Sub>
          </Sec>

          {/* 05 Rules */}
          <Sec id="rules" num="05" title="Rules — Auto-Loading Domain Knowledge">
            <R><P>Rules are markdown files in <C>.claude/rules/</C>. The key mechanism is <B>path-scoping</B>: rules with a <C>paths:</C> YAML frontmatter only load when Claude touches matching files. Always-on rules (no <C>paths:</C>) load every session — keep these minimal.</P></R>
            <R delay={.05}><C block lang="text">{`.claude/rules/
├── plan-first.md          # Always-on
├── python-standards.md    # paths: ["**/*.py"]
├── api-design.md          # paths: ["src/api/**/*.ts"]
└── testing.md             # paths: ["tests/**"]`}</C></R>
            <R delay={.1}><C block lang="markdown">{`---
paths:
  - "src/api/**/*.ts"
---

# API Development Rules

- All endpoints must include input validation
- Use the standard error response format
- Include OpenAPI documentation comments`}</C></R>
            <R><Box type="tip">Patterns support globs and brace expansion (<C>{"**/*.{ts,tsx}"}</C>). Supports symlinks for sharing across projects. One topic per file, descriptive filenames.</Box></R>
          </Sec>

          {/* 06 Skills & Plugins */}
          <Sec id="skills" num="06" title="Skills & Plugins">
            <Sub title="Skills — Reusable Slash Commands">
              <P>Skills are multi-step workflows invoked with <C>/command-name</C>. Live at <C>.claude/skills/[name]/SKILL.md</C> (project) or <C>~/.claude/skills/[name]/SKILL.md</C> (user). Keep SKILL.md <B>under 500 lines</B>. Skills hot-reload without restart.</P>
              <C block lang="markdown">{`---
name: deploy
description: Build, test, and deploy to staging.
  Use when user says "deploy" or "ship it".
---

# Steps:
1. Run the full test suite
2. Build the production bundle
3. Deploy to staging
4. Verify health check`}</C>
              <T headers={["Frontmatter","Effect"]} rows={[
                ["disable-model-invocation: true","Only user can invoke — /commit, /deploy"],
                ["user-invocable: false","Only Claude can invoke — background knowledge"],
                ["context: fork","Runs in a separate subagent context window"],
              ]}/>
            </Sub>

            <Sub title="Built-in Skills">
              <P>Claude Code ships with several bundled skills you can use immediately. Type <C>/</C> to see all available commands:</P>
              <T headers={["Skill","What It Does"]} rows={[
                ["/simplify","Simplify complex code"],
                ["/batch","Run operations across multiple files"],
                ["/debug","Systematic debugging workflow"],
                ["/security-review","Security audit of recent changes"],
              ]}/>
            </Sub>

            <Sub title="Plugins — Community Extensions">
              <P>Plugins extend Claude Code with skills, agents, hooks, and MCP servers. They are distributed through <B>marketplaces</B> — GitHub repositories that host collections of plugins. Anthropic maintains official plugins in the <C>anthropics/claude-code</C> repository, and the community has built many more.</P>
              <P>Use the <C>/plugin</C> command to discover, install, and manage plugins interactively.</P>
            </Sub>

            <Sub title="Example: Installing the Frontend Design Skill">
              <P>The <B>Frontend Design</B> plugin is an official Anthropic plugin that teaches Claude to produce distinctive, production-grade UI code instead of generic-looking output. It is a good example of how plugins work in practice.</P>
              <P>Inside Claude Code, run these two commands:</P>
              <C block lang="text">{`# Step 1: Add Anthropic's official plugin marketplace
/plugin marketplace add anthropics/claude-code

# Step 2: Install the frontend-design plugin
/plugin install frontend-design@claude-code`}</C>
              <P>Once installed, the skill activates automatically whenever you ask Claude to build frontend interfaces. Try prompts like "Create a dashboard for a music streaming app" or "Build a landing page for an AI startup" — Claude will commit to a bold aesthetic direction instead of producing cookie-cutter layouts.</P>
              <P>The same pattern works for any marketplace plugin: add the marketplace, then install individual plugins by name.</P>
              <Box type="tip">Other official plugins in the Anthropic marketplace include <B>code-review</B> (multi-agent PR review), <B>feature-dev</B> (guided feature development), and <B>hookify</B> (create custom hooks from conversation patterns). Run <C>/plugin</C> to browse what's available.</Box>
            </Sub>
          </Sec>

          {/* 07 Subagents */}
          <Sec id="subagents" num="07" title="Subagents — Specialised Delegates">
            <R><P>Subagents run in their own context window with a custom system prompt, tool access, and permissions. Claude delegates automatically when a task matches.</P></R>
            <Sub title="Built-in Subagents">
              <T headers={["Subagent","Purpose","Tools"]} rows={[
                ["Explore","Fast read-only codebase search","Read-only"],
                ["Plan","Research agent for plan mode","Read-only"],
                ["General-purpose","Complex multi-step tasks","Full"],
              ]}/>
            </Sub>
            <Sub title="Custom Subagents">
              <P>Markdown files in <C>.claude/agents/</C> (project) or <C>~/.claude/agents/</C> (user). Use <C>/agents</C> to create and manage interactively.</P>
              <C block lang="markdown">{`---
name: code-reviewer
description: Expert code review. Use when
  reviewing for quality and security.
tools: Read, Grep, Glob
model: sonnet
---

You are a senior code reviewer. For each file:
1. Check for bugs and security issues
2. Evaluate performance
3. Suggest improvements with line refs
4. Rate quality (1-10)`}</C>
              <T headers={["Property","Effect"]} rows={[
                ["tools:","Restrict tools. Omit to inherit all."],
                ["model: sonnet|opus|haiku|inherit","Choose model per agent."],
                ["background: true","Run as a background task."],
                ['isolation: "worktree"',"Run in an isolated git worktree."],
              ]}/>
            </Sub>
            <R><Box type="warn">Opus 4.6 tends to spawn subagents even when direct work suffices. Add CLAUDE.md guidance: "For simple tasks, single-file edits, or sequential operations, work directly."</Box></R>
          </Sec>

          {/* 08 Permissions & Hooks */}
          <Sec id="settings" num="08" title="Permissions & Hooks">
            <Sub title="Permission Modes">
              <P>Claude Code has several permission modes that control how much autonomy Claude has. You can set these via <C>/config</C>, CLI flags, or settings.json.</P>
              <T headers={["Mode","Behaviour"]} rows={[
                ["default","Claude asks permission before each action"],
                ["acceptEdits","Auto-approves file edits; other tools still prompt"],
                ["plan","Claude analyses and plans but cannot make changes"],
              ]}/>
            </Sub>
            <Sub title="Permission Rules">
              <P>Define allow/deny rules in <C>.claude/settings.json</C>:</P>
              <C block lang="json">{`{
  "permissions": {
    "allow": [
      "Bash(git *)", "Bash(npm run *)",
      "Read", "Glob", "Grep"
    ],
    "deny": ["Bash(rm -rf *)"]
  }
}`}</C>
              <P>Rules use pattern matching: <C>Bash(npm:*)</C> matches any command starting with "npm". File rules support globs: <C>Read(./src/**/*.ts)</C>.</P>
            </Sub>

            <Sub title="--dangerously-skip-permissions">
              <Box type="danger"><B>This flag bypasses ALL permission prompts.</B> Claude will read, write, delete files and execute shell commands without asking. It is intended <B>only</B> for use inside isolated, sandboxed environments like Docker containers or dev containers with firewall rules. Never use it on your main machine or with access to production systems.</Box>
              <C block lang="bash">{`# ONLY inside a sandboxed container
claude --dangerously-skip-permissions`}</C>
              <P>Anthropic provides a reference dev container implementation with network firewall rules specifically designed for this use case.</P>
            </Sub>

            <Sub title="Hooks">
              <P>Hooks are deterministic shell commands or HTTP endpoints that fire at lifecycle events. They do not depend on LLM judgment — they always run.</P>
              <C block lang="json">{`{
  "hooks": {
    "PostToolUse": [{
      "matcher": "Edit|MultiEdit|Write",
      "hooks": [{
        "type": "command",
        "command": "prettier --write \\"$file\\"",
        "timeout": 30
      }]
    }]
  }
}`}</C>
              <T headers={["Event","Fires When"]} rows={[
                ["PreToolUse","Before a tool call — can block/modify"],
                ["PostToolUse","After a tool call completes"],
                ["Stop / SubagentStop","When Claude or subagent finishes"],
                ["PreCompact","Before context compaction"],
                ["SessionStart / SessionEnd","Session lifecycle boundaries"],
                ["SubagentStart","When a subagent is spawned"],
                ["UserPromptSubmit","When user sends a message"],
                ["Notification","When Claude wants attention"],
                ["PermissionRequest","Permission decision needed"],
              ]}/>
              <Box type="tip">Use hooks for enforcement that must always happen (formatting, logging, file protection). Use rules for nuanced judgment. Settings edits require session restart. 60-second default timeout. Hooks run in parallel. Use <C>/hooks</C> to manage interactively.</Box>
            </Sub>
          </Sec>

          {/* 09 Memory */}
          <Sec id="memory" num="09" title="Memory System">
            <R><P>Two complementary systems, both loaded at every conversation start.</P></R>
            <Sub title="CLAUDE.md Files (You Write)">
              <P>Instructions you author. Persist on disk. Survive compaction. Covered in section 04.</P>
            </Sub>
            <Sub title="Auto Memory (Claude Writes)">
              <P>Claude accumulates knowledge across sessions without you writing anything — build commands, debugging insights, architecture notes, style preferences. When you correct Claude ("no, use pnpm not npm"), it saves that to auto memory.</P>
              <C block lang="text">{`~/.claude/projects/<project>/memory/
├── MEMORY.md          # Index, loaded every session
├── debugging.md       # Debugging patterns
├── api-conventions.md # Design decisions
└── ...                # Topic files as needed`}</C>
              <P>Run <C>/memory</C> to browse, toggle, or edit. Plain markdown. Machine-local; all worktrees in the same repo share one directory.</P>
            </Sub>
          </Sec>

          {/* 10 Context Management */}
          <Sec id="context" num="10" title="Context Management">
            <R><P>Each session starts with a fresh context window. As you work, the window fills with conversation history, file contents, and tool outputs. Managing this is key to consistent results and controlling costs.</P></R>
            <Sub title="Key Commands">
              <T headers={["Command","When to Use"]} rows={[
                ["/clear","Switching to an unrelated task. Starts fresh, preserves old session for /resume."],
                ["/compact","Conversation is long but you want to continue. Summarises history, frees space."],
                ["/cost","Check current token usage and spend."],
                ["@filename","Include a specific file directly. Prevents Claude from scanning the whole project."],
              ]}/>
            </Sub>
            <Sub title="What Survives Compaction">
              <P><B>CLAUDE.md</B> — re-read from disk, always fully present. <B>Auto memory</B> — persists on disk independently. <B>Conversation details</B> — compressed, specific reasoning may be lost. Save important decisions to memory or files before they compress away.</P>
            </Sub>
            <Sub title="Cost-Saving Habits">
              <P>Use <C>/clear</C> between unrelated tasks. Use <C>@filename</C> instead of vague requests like "look at my code." Be specific — "add input validation to the login function in auth.ts" costs far fewer tokens than "improve this codebase." Use <C>/compact Focus on [topic]</C> to tell Claude what to preserve during summarisation.</P>
            </Sub>
          </Sec>

          {/* 11 Patterns */}
          <Sec id="patterns" num="11" title="Workflow Patterns">
            <Sub title="Plan-First Development">
              <P>For non-trivial tasks, Claude enters plan mode — researches via the Plan subagent, drafts an approach, presents for approval before touching files. Trigger with "plan this first", press <B>Shift+Tab</B> in the prompt, or start with <C>claude --plan</C>.</P>
            </Sub>
            <Sub title="Subagent Delegation">
              <P>Automatic delegation when tasks benefit from isolation or parallelism. Three parallel subagents is the sweet spot. They cannot see each other's work.</P>
            </Sub>
            <Sub title="Adversarial Review">
              <P>Read-only critic subagent finds issues. Separate fixer applies corrections. Critic cannot fix (no downplay incentive). Fixer cannot approve itself. Loop until critic approves.</P>
            </Sub>
          </Sec>

          {/* 12 Setup */}
          <Sec id="setup" num="12" title="Setup Best Practices">
            <Sub title="Day 1 Checklist">
              <P>1. Install Claude Code using the native installer. 2. Create <C>CLAUDE.md</C> in the project root (under 200 lines). 3. Navigate to your project folder, run <C>claude</C>, and describe what you want. 4. Let auto memory learn from your corrections.</P>
            </Sub>
            <Sub title="Progressive Adoption">
              <P>Start with <C>CLAUDE.md</C> alone. Add rules for repeating patterns. Add skills for frequent multi-step workflows. Add subagents for specialised review. Add plugins when you discover community tools that fit your stack.</P>
            </Sub>
            <Sub title="Instruction Budget">
              <P>Each CLAUDE.md under 200 lines. Always-on rules: 2–3 files. Use <C>paths:</C> on everything else. If Claude ignores rules, context budget is exceeded — consolidate.</P>
            </Sub>
            <Sub title="Verification">
              <P>Enforce with a rule in <C>.claude/rules/verification.md</C> and a <C>PostToolUse</C> hook. "Done" means "verified."</P>
            </Sub>
          </Sec>

          {/* 13 Troubleshooting */}
          <Sec id="troubleshooting" num="13" title="Troubleshooting">
            <R><T headers={["Problem","Solution"]} rows={[
              ["Claude ignores rules","Check paths: patterns. Reduce instruction volume. Ask Claude to read rule explicitly."],
              ["Context lost after compaction","CLAUDE.md reloads automatically. Point Claude to auto memory or files."],
              ["Skills not auto-invoked","Check description triggers. Verify disable-model-invocation not set."],
              ["Hooks not firing","Check settings.json. Scripts executable. Restart session after edits. Use /hooks."],
              ["Excessive subagent spawning","Add CLAUDE.md guidance. Known Opus 4.6 tendency."],
              ["Claude forgets mid-session","Use /clear between tasks. Save to memory. Extract workflows into skills."],
              ["Installation issues","Run claude doctor. Check native vs npm conflicts. See Anthropic's troubleshooting guide."],
            ]}/></R>
          </Sec>

          {/* 14 Reference */}
          <Sec id="reference" num="14" title="Quick Reference">
            <Sub title="Configuration Locations">
              <T headers={["What","Where","Loaded"]} rows={[
                ["Project instructions","./CLAUDE.md","Every session"],
                ["User instructions","~/.claude/CLAUDE.md","Every session"],
                ["Local overrides","./CLAUDE.local.md","Every session"],
                ["Always-on rules",".claude/rules/ (no paths:)","Every session"],
                ["Scoped rules",".claude/rules/ (with paths:)","Matching files"],
                ["Skills",".claude/skills/*/SKILL.md","Invocation"],
                ["Subagents",".claude/agents/*.md","Delegation"],
                ["Auto memory","~/.claude/projects/*/memory/","Every session"],
                ["Settings",".claude/settings.json","Every session"],
                ["Plugins","Via /plugin command","When enabled"],
              ]}/>
            </Sub>
            <Sub title="Key Slash Commands">
              <T headers={["Command","Purpose"]} rows={[
                ["/clear","Start fresh session (old session preserved)"],
                ["/compact","Summarise context to free space"],
                ["/memory","Browse and manage auto memory"],
                ["/agents","Create and manage subagents"],
                ["/plugin","Discover and install plugins"],
                ["/config","Edit settings"],
                ["/hooks","Manage hooks interactively"],
                ["/cost","Check token usage"],
                ["/resume","Resume a previous session"],
                ["/rename","Name current session for later"],
              ]}/>
            </Sub>
          </Sec>

        </div>
      </main>
    </div>
  </div>;
}
